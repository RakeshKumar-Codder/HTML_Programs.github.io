<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <LINK rel="STYLESHEET" href="CREATE_A_FORM.CSS">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #f0f0f0;
            color: #333;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        h4 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: #333;
        }
        
        form {
            background: white;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        
        td:first-child {
            font-weight: bold;
            width: 30%;
            color: #333;
        }
        
        td:last-child {
            width: 70%;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="date"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
            color: #333;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="date"]:focus,
        input[type="file"]:focus,
        textarea:focus,
        select:focus {
            border: 1px solid #4CAF50;
            outline: none;
            background: #f9f9f9;
        }
        
        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }
        
        input[type="submit"],
        input[type="reset"] {
            width: 48%;
            padding: 12px;
            margin-top: 15px;
            margin-right: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
        }
        
        input[type="reset"] {
            background: #f44336;
            margin-right: 0;
        }
        
        input[type="submit"]:hover {
            background: #45a049;
        }
        
        input[type="reset"]:hover {
            background: #da190b;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <H4>STUDENT REGISTRATION FORM</H4>
    <form name="registrationForm" method="POST" action="submit.php">
        <table>
            <tr>
                <td>FIRST NAME:</td>
                <td>
                    <input type="text" name="fname" placeholder="Enter your first name" required>
                </td>
            </tr>
            <tr>
                <td>LAST NAME:</td>
                <td>
                    <input type="text" name="lname" placeholder="Enter your last name" required>
                </td>
            </tr>
            <tr>
                <td>FATHER NAME:</td>
                <td>
                    <input type="text" name="fathername" placeholder="Enter father's name" required>
                </td>
            </tr>
            <tr>
                <td>MOTHER NAME:</td>
                <td>
                    <input type="text" name="mothername" placeholder="Enter mother's name" required>
                </td>
            </tr>
            <tr>
                <td>DATE OF BIRTH:</td>
                <td>
                    <input type="date" name="dob" required>
                </td>
            </tr>
            <tr>
                <td>EMAIL:</td>
                <td>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </td>
            </tr>
            <tr>
                <td>GENDER:</td>
                <td>
                    <input type="radio" name="gender" value="male" required> Male
                    <input type="radio" name="gender" value="female"> Female
                </td>
            </tr>
            <tr>
                <td>CHOOSE COURSE:</td>
                <td>
                    <select name="course" required>
                        <option value="">--SELECT--</option>
                        <option value="CSS">CSS</option>
                        <option value="JAVA">JAVA</option>
                        <option value="C">C</option>
                        <option value="C++">C++</option>
                        <option value="HTML">HTML</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>HOBBIES:</td>
                <td>
                    <input type="checkbox" name="hobby" value="SINGING"> SINGING
                    <input type="checkbox" name="hobby" value="DANCING"> DANCING
                    <input type="checkbox" name="hobby" value="PLAY"> PLAY
                    <input type="checkbox" name="hobby" value="READING"> READING
                </td>
            </tr>
            <tr>
                <td>ADDRESS:</td>
                <td>
                    <textarea name="address" placeholder="Enter your address" rows="4" required></textarea>
                </td>
            </tr>
            <tr>
                <td>PHOTO:</td>
                <td>
                    <input type="file" name="photo" accept="image/*" required>
                </td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <input type="submit" value="SUBMIT">
                    <input type="reset" value="RESET" style="margin-left: 10px;">
                </td>
            </tr>
        </table>
    </form>
    
    
</body>
</html>
